services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    # No host port: backend reaches it via mongodb://mongo:27017 on the internal
    # network. The local override file republishes 27017 for dev convenience.
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ifc_ps
      PORT: "5000"
      # In production set this to the frontend origin (e.g. https://app.example.com)
      # via Coolify's env file. Default keeps local dev working.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
    # No host port: Coolify's proxy routes the backend domain to this container
    # port. The local override file republishes 5000 for dev.
    expose:
      - "5000"
    depends_on:
      mongo:
        condition: service_healthy

  # Serves the built React SPA (nginx). VITE_API_BASE_URL is baked into the
  # bundle at build time, so changing it requires a rebuild, not just a restart.
  # In production set it to the backend's public API URL (e.g.
  # https://api.example.com/api) via Coolify's env file; the default keeps local
  # dev pointing at the host-published backend.
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
    restart: unless-stopped
    # No host port: Coolify's proxy routes the frontend domain to port 80.
    # The local override file republishes 8080 for dev.
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  mongo-data:
